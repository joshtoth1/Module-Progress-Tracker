<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>SDM Erection Progress — Covalent Kwinana</title>
<style>
  :root{
    --bg0:#0c1216;--bg1:#172128;--panel:rgba(15,22,27,.93);--line:rgba(140,170,190,.14);
    --ink:#dce7ee;--ink-dim:#8499a6;--accent:#ff6a13;
    --s1:#4a90d9;--s2:#8b6fe0;--s3:#f0a830;--s4:#46c46a;
    --c-legs:#4a90d9;--c-beams:#d98c3a;--c-bracing:#23b2a4;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(120% 120% at 70% 0%,var(--bg1),var(--bg0));color:var(--ink);font-family:var(--sans)}
  #b-collapse{position:absolute;top:9px;right:10px;width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);cursor:pointer;z-index:6;font-size:15px;line-height:1}
  #b-collapse:hover{border-color:var(--accent);color:var(--accent)}
  #b-reveal{position:fixed;top:14px;left:14px;z-index:7;display:none;width:38px;height:38px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:15px;cursor:pointer}
  #b-reveal:hover{border-color:var(--accent);color:var(--accent)}
  body.panelhidden #dash{display:none}
  body.panelhidden #app{left:0}
  body.panelhidden #b-reveal{display:block}
  @media(max-width:800px){body.panelhidden #app{top:0}}
  #app{position:fixed;inset:0;left:366px}
  canvas{display:block}
  @media(max-width:800px){#app{left:0;top:48%;bottom:0}}

  #dash{position:fixed;top:0;left:0;bottom:0;width:366px;background:var(--panel);border-right:1px solid var(--line);backdrop-filter:blur(10px);display:flex;flex-direction:column;z-index:5}
  @media(max-width:800px){#dash{width:100%;bottom:auto;height:48%;border-right:0;border-bottom:1px solid var(--line)}}
  .pad{padding:14px 16px}
  .eyebrow{font:600 10px/1.4 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  #title{font-size:17px;font-weight:650;background:none;border:0;color:var(--ink);width:100%;padding:2px 0;margin-top:3px}
  #title:focus{outline:none;border-bottom:1px solid var(--accent)}
  .daterow{display:flex;align-items:center;gap:8px;margin-top:4px;color:var(--ink-dim);font:12px var(--mono)}
  #date{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:4px 7px;font:12px var(--mono)}

  .overall{padding:0 16px 11px}
  .opct{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .opct b{font:650 21px var(--sans)} .opct span{font:10px var(--mono);color:var(--ink-dim);letter-spacing:.05em;text-transform:uppercase}
  .obar{height:8px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid var(--line)}
  .ofill{height:100%;width:0;background:linear-gradient(90deg,var(--s1),var(--s4));transition:width .45s}

  .modeline{padding:8px 16px 4px;display:flex;align-items:center;gap:8px;font:11px var(--mono);color:var(--ink-dim)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{font:600 11px var(--sans);background:none;border:0;color:var(--ink-dim);padding:5px 9px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#0c1216}
  .ghostbtn{margin-left:auto;font:600 11px var(--sans);background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:7px;padding:5px 9px;cursor:pointer}

  /* selected member card */
  #selcard{margin:6px 14px;border:1px solid var(--accent);border-radius:11px;padding:11px 12px;display:none;background:rgba(255,106,19,.06)}
  #selcard.show{display:block}
  #selcard .h{display:flex;align-items:center;gap:8px;font:600 13.5px var(--sans)}
  #selcard .sub{font:11px var(--mono);color:var(--ink-dim);margin:2px 0 9px}
  .statusrow{display:flex;gap:5px;flex-wrap:wrap}
  .sbtn{font:600 11px var(--sans);border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink-dim);border-radius:13px;padding:6px 10px;cursor:pointer;transition:.1s}
  .sbtn:hover{color:var(--ink)} .sbtn.on{color:#0c1216;border-color:transparent}
  .applyall{margin-top:8px;font:600 11px var(--sans);background:none;border:1px dashed var(--ink-dim);color:var(--ink-dim);border-radius:7px;padding:6px 9px;cursor:pointer;width:100%}
  .applyall:hover{color:var(--ink);border-color:var(--accent)}

  .seclist{flex:1;overflow:auto;padding:3px 11px}
  .sec{border:1px solid var(--line);border-radius:11px;margin:7px 0;padding:9px 11px;background:rgba(255,255,255,.015)}
  .sec.sel{border-color:var(--accent)}
  .sec .hd{display:flex;align-items:center;gap:8px;cursor:pointer}
  .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
  .sec .nm{font:600 12.5px var(--sans);background:none;border:0;color:var(--ink);flex:1;min-width:0;padding:1px 0}
  .sec .nm:focus{outline:none;border-bottom:1px dashed var(--ink-dim)}
  .sec .pc{font:11px var(--mono);color:var(--ink-dim)}
  .crow{display:flex;align-items:center;gap:7px;margin-top:7px}
  .crow .cn{font:11.5px var(--sans);color:var(--ink);width:84px;flex:0 0 auto}
  .crow .cn small{color:var(--ink-dim);font:10px var(--mono)}
  .pips{display:flex;gap:3px;flex:1}
  .pip{flex:1;height:14px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,.1);transition:.1s;position:relative}
  .pip:hover{transform:scaleY(1.25)}

  .legend{padding:8px 16px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:5px 12px}
  .lg{display:flex;align-items:center;gap:5px;font:10.5px var(--mono);color:var(--ink-dim)}
  .lg i{width:9px;height:9px;border-radius:2px}
  .actions{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap}
  button.act{flex:1;min-width:84px;font:600 11.5px var(--sans);color:var(--ink);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;padding:9px;cursor:pointer}
  button.act:hover{background:rgba(255,255,255,.1);border-color:rgba(255,170,120,.45)}
  button.act.primary{background:var(--accent);color:#0c1216;border-color:var(--accent)}

  #hint{position:absolute;left:14px;bottom:14px;font:11px/1.5 var(--mono);color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 11px;z-index:3}
  #hint b{color:var(--ink)}
  #nav{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:4}
  #nav button{width:40px;height:40px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:16px;cursor:pointer}
  #nav button:hover{border-color:var(--accent);color:var(--accent)}
  #elev{writing-mode:vertical-lr;direction:rtl;-webkit-appearance:slider-vertical;width:26px;height:210px;accent-color:var(--accent);cursor:pointer}
  #navlbl{font:9px var(--mono);color:var(--ink-dim);letter-spacing:.1em}
  #zoom{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;gap:6px;z-index:4}
  #zoom button{width:40px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:18px;cursor:pointer}
  #zoom button:hover{border-color:var(--accent);color:var(--accent)}
  #vtop{position:absolute;left:50%;top:14px;transform:translateX(-50%);display:flex;gap:7px;z-index:4}
  #vtop button{font:600 12px var(--sans);background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 12px;cursor:pointer}
  #vtop button.on{background:var(--accent);color:#0c1216;border-color:var(--accent)}
  #vtop .vseg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  #vtop .vseg button{border:0;border-radius:0;padding:8px 12px}
  #vtop .vseg button+button{border-left:1px solid var(--line)}
  #vtop .vseg button.on{background:var(--accent);color:#0c1216}
  #toast{position:fixed;left:calc(50% + 183px);bottom:24px;transform:translateX(-50%) translateY(18px);background:#10242c;border:1px solid var(--accent);color:var(--ink);padding:10px 16px;border-radius:9px;font:13px var(--sans);opacity:0;transition:.3s;z-index:20;pointer-events:none}
  @media(max-width:800px){#toast{left:50%}}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;gap:13px;background:var(--bg0);z-index:30;transition:opacity .5s}
  #load.hide{opacity:0;pointer-events:none}
  .spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--accent);border-radius:50%;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  #load .t{font:12px var(--mono);color:var(--ink-dim)}
  @media(prefers-reduced-motion:reduce){.spin{animation:none}.ofill{transition:none}}
</style>
</head>
<body>
<div id="dash">
  <button id="b-collapse" title="Hide panel (H)">‹</button>
  <div class="pad">
    <div class="eyebrow">Covalent Lithium · Kwinana · SDM</div>
    <input id="title" value="Structural Erection Progress"/>
    <div class="daterow">Update&nbsp;<input id="date" type="date"/></div>
  </div>
  <div class="overall">
    <div class="opct"><b id="opct">0%</b><span>overall complete</span></div>
    <div class="obar"><div class="ofill" id="ofill"></div></div>
  </div>
  <div class="modeline">Colour
    <span class="seg"><button id="m-status" class="on">Status</button><button id="m-type">Type</button></span>
    <button class="ghostbtn" id="b-ghost">Hide remaining</button>
  </div>
  <div id="selcard">
    <div class="h"><span class="dot" id="sel-dot"></span><span id="sel-name">—</span></div>
    <div class="sub" id="sel-sub"></div>
    <div class="statusrow" id="sel-status"></div>
    <button class="applyall" id="sel-applyall"></button>
  </div>
  <div class="seclist" id="seclist"></div>
  <div class="legend" id="legend"></div>
  <div class="actions">
    <button class="act primary" id="b-copy">Copy email summary</button>
    <button class="act" id="b-export">Export</button>
    <button class="act" id="b-import">Import</button>
    <button class="act" id="b-reset">Reset</button>
  </div>
</div>

<button id="b-reveal" title="Show panel (H)">☰</button>
<div id="app"></div>
<div id="vtop"><span class="vseg"><button id="t-orbit" class="on">Orbit</button><button id="t-pan">Pan</button><button id="t-select">Select</button></span><button id="b-frame">Frame all</button><button id="b-plates">Connections</button><button id="b-spin">Spin</button><button id="b-full">⛶ Fullscreen</button></div>
<div id="hint"><b>Tap</b> a brace/column to set status&nbsp;·&nbsp;<b>Orbit / Pan</b> sets what dragging does&nbsp;·&nbsp;<b>▲▼</b> travel</div>
<div id="nav"><button id="up">▲</button><input id="elev" type="range" min="0" max="100" value="50"/><button id="down">▼</button><div id="navlbl">ELEV</div></div>
<div id="zoom"><button id="zin">+</button><button id="zout">−</button></div>
<div id="toast"></div>
<div id="load"><div class="spin"></div><div class="t" id="load-t">Loading model…</div></div>

  const app=$('#app');
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));resize();app.appendChild(renderer.domElement);
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,app.clientWidth/app.clientHeight,.05,20000);
  scene.add(new THREE.HemisphereLight(0xbcd2e0,0x1b242a,.95));
  const k=new THREE.DirectionalLight(0xffffff,.95);k.position.set(.5,1,.4);scene.add(k);
  const r=new THREE.DirectionalLight(0xffd9b0,.3);r.position.set(-.6,.2,-.7);scene.add(r);
  statusMats=STAGES.map(s=>new THREE.MeshStandardMaterial({color:s.col,metalness:.5,roughness:.55}));
  typeMats=COMPS.map(c=>new THREE.MeshStandardMaterial({color:c.col,metalness:.5,roughness:.55}));
  ghostMat=new THREE.MeshStandardMaterial({color:0x5a6873,metalness:.3,roughness:.7,transparent:true,opacity:.12,depthWrite:false});
  selMat=new THREE.MeshStandardMaterial({color:0xffa14d,emissive:0xff6a13,emissiveIntensity:.5,metalness:.4,roughness:.4});

  const pos=f32(data.positions); box=new THREE.Box3();
  let voff=0;
  META.forEach((m,i)=>{
    const sub=pos.subarray(voff*3,(voff+m.v)*3); voff+=m.v;
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(sub,3));
    geo.computeVertexNormals(); geo.computeBoundingBox(); box.union(geo.boundingBox);
    const mesh=new THREE.Mesh(geo,ghostMat); mesh.userData.i=i; scene.add(mesh); meshes.push(mesh);
  });
  // plates context (single mesh, optional)
  const pp=f32(data.plates);
  if(pp.length){const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pp,3));g.computeVertexNormals();
    platesMesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x44525c,metalness:.4,roughness:.7,transparent:true,opacity:.5}));
    platesMesh.visible=false; scene.add(platesMesh);}

  center=box.getCenter(new THREE.Vector3());const size=box.getSize(new THREE.Vector3());radius=size.length()/2;
  grid=new THREE.GridHelper(Math.max(size.x,size.z)*1.7,18,0x3a4a54,0x222e35);grid.position.set(center.x,box.min.y,center.z);scene.add(grid);
  camMinY=box.min.y;camMaxY=box.max.y;
  setupControls();frameAll(true);animate();
}
function resize(){const a=$('#app');if(renderer)renderer.setSize(a.clientWidth,a.clientHeight);if(camera){camera.aspect=a.clientWidth/a.clientHeight;camera.updateProjectionMatrix();}}
addEventListener('resize',resize);

let camT=new THREE.Vector3(),sph={r:1,theta:.6,phi:1.12},toPos=null,camMinY=0,camMaxY=1;
function applySph(){const s=Math.sin(sph.phi);camera.position.set(camT.x+sph.r*s*Math.sin(sph.theta),camT.y+sph.r*Math.cos(sph.phi),camT.z+sph.r*s*Math.cos(sph.theta));camera.lookAt(camT);syncElev();}
function updateSph(){const o=camera.position.clone().sub(camT);sph.r=o.length();sph.theta=Math.atan2(o.x,o.z);sph.phi=Math.acos(Math.min(1,Math.max(-1,o.y/sph.r)));}
function frameAll(i){selected=-1;refreshSel();camT.copy(center);const d=radius/Math.sin(camera.fov*Math.PI/360)*1.05;const dir=new THREE.Vector3(.55,.26,.8).normalize();const w=center.clone().add(dir.multiplyScalar(d));if(i){camera.position.copy(w);camera.lookAt(center);updateSph();}else toPos=w.clone();}
function setupControls(){
  const el=renderer.domElement;let mode=0,px=0,py=0,dt=0,mv=0;
  el.addEventListener('pointerdown',e=>{mode=(e.button===0)?((tool==='pan')?2:1):2;px=e.clientX;py=e.clientY;dt=performance.now();mv=0;el.setPointerCapture(e.pointerId);spin=false;$('#b-spin').classList.remove('on');});
  el.addEventListener('pointerup',e=>{if(e.button===0&&mv<6&&performance.now()-dt<400)pick(e);mode=0;});
  el.addEventListener('pointermove',e=>{if(!mode)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;mv+=Math.abs(dx)+Math.abs(dy);
    if(mode===1){sph.theta-=dx*.005;sph.phi=Math.min(Math.PI-.05,Math.max(.05,sph.phi-dy*.005));applySph();}
    else{const pan=sph.r*.0012;const rt=new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);const up=new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);camT.add(rt.multiplyScalar(-dx*pan).add(up.multiplyScalar(dy*pan)));applySph();}});
  el.addEventListener('wheel',e=>{e.preventDefault();zoomBy(Math.pow(1.0015,e.deltaY));},{passive:false});
}
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
function pick(e){const r=renderer.domElement.getBoundingClientRect();ndc.x=((e.clientX-r.left)/r.width)*2-1;ndc.y=-((e.clientY-r.top)/r.height)*2+1;ray.setFromCamera(ndc,camera);const vis=meshes.filter(m=>m.visible);const h=ray.intersectObjects(vis,false);if(h.length){selectMember(h[0].object.userData.i);}else{selected=-1;refreshSel();renderColors();}}
function zoomBy(f){sph.r=Math.max(radius*.04,Math.min(radius*16,sph.r*f));applySph();}
function animate(){requestAnimationFrame(animate);if(toPos){camera.position.lerp(toPos,.14);camera.lookAt(camT);if(camera.position.distanceTo(toPos)<radius*.008){toPos=null;updateSph();}}if(spin){sph.theta+=.0024;applySph();}renderer.render(scene,camera);}
function syncElev(){const t=(camT.y-camMinY)/((camMaxY-camMinY)||1);$('#elev').value=Math.round(t*100);}
function setElevPct(p){camT.y=camMinY+(camMaxY-camMinY)*(p/100);applySph();}
function stepElev(d){setElevPct(Math.max(0,Math.min(100,(+$('#elev').value)+d)));}

/* ---------- coloring ---------- */
function matFor(i){
  const st=state.status[i];
  if(i===selected) return selMat;
  if(st===0) return ghostMat;
  return colorMode==='type'?typeMats[META[i].c]:statusMats[st];
}
function renderColors(){
  meshes.forEach((mesh,i)=>{
    const st=state.status[i];
    mesh.visible=(st!==0)||ghost||(i===selected);
    mesh.material=matFor(i);
  });
}
function pct(){let a=0;for(let i=0;i<META.length;i++)a+=state.status[i]/4;return Math.round(a/META.length*100);}
function secComp(sec,c){const idx=[];for(let i=0;i<META.length;i++)if(META[i].s===sec&&META[i].c===c)idx.push(i);return idx;}
function secPct(sec){const ix=[];for(let i=0;i<META.length;i++)if(META[i].s===sec)ix.push(i);if(!ix.length)return 0;let a=0;ix.forEach(i=>a+=state.status[i]/4);return Math.round(a/ix.length*100);}
function dominantColor(sec){let a=0,n=0;for(let i=0;i<META.length;i++)if(META[i].s===sec){a+=state.status[i];n++;}if(!n)return hex(STAGES[0].col);return hex(STAGES[Math.round(a/n)].col);}

/* ---------- dashboard ---------- */
function renderDash(){
  $('#title').value=state.title;$('#date').value=state.date;
  const p=pct();$('#opct').textContent=p+'%';$('#ofill').style.width=p+'%';
  const list=$('#seclist');list.innerHTML='';
  for(let s=0;s<NSEC;s++){
    const div=document.createElement('div');div.className='sec'+(selected!==-1&&META[selected].s===s?' sel':'');div.dataset.s=s;
    let rows='';
    COMPS.forEach((c,ci)=>{
      const ix=secComp(s,ci); if(!ix.length)return;
      // pip distribution
      let pips='';
      STAGES.forEach((S,si)=>{const cnt=ix.filter(i=>state.status[i]===si).length;
        pips+=`<div class="pip" title="${c.label}: set ${S.label}" data-s="${s}" data-c="${ci}" data-set="${si}" style="background:${hex(S.col)};opacity:${cnt? .35+.65*cnt/ix.length:.16}"></div>`;});
      const done=ix.filter(i=>state.status[i]>0).length;
      rows+=`<div class="crow"><div class="cn">${c.label} <small>${done}/${ix.length}</small></div><div class="pips">${pips}</div></div>`;
    });
    div.innerHTML=`<div class="hd"><span class="dot" style="background:${dominantColor(s)}"></span>
      <input class="nm" value="${state.names[s].replace(/"/g,'&quot;')}"/><span class="pc">${secPct(s)}%</span></div>${rows}`;
    list.appendChild(div);
  }
  $('#legend').innerHTML = colorMode==='type'
    ? COMPS.map(c=>`<span class="lg"><i style="background:${hex(c.col)}"></i>${c.label}</span>`).join('')
    : STAGES.map(s=>`<span class="lg"><i style="background:${hex(s.col)};${s.key==='none'?'opacity:.5':''}"></i>${s.label}</span>`).join('');
  refreshSel();
}
function refreshSel(){
  const card=$('#selcard');
  if(selected===-1){card.classList.remove('show');return;}
  const m=META[selected];const comp=COMPS[m.c];
  card.classList.add('show');
  $('#sel-dot').style.background=hex(STAGES[state.status[selected]].col);
  $('#sel-name').textContent=`${comp.label.replace(/s$/,'')} · ${state.names[m.s]}`;
  $('#sel-sub').textContent=`Member #${selected+1} · ${STAGES[state.status[selected]].label}`;
  $('#sel-status').innerHTML=STAGES.map((S,si)=>`<span class="sbtn ${state.status[selected]===si?'on':''}" data-set="${si}" style="${state.status[selected]===si?`background:${hex(S.col)}`:''}">${S.label}</span>`).join('');
  $('#sel-applyall').textContent=`Apply “${STAGES[state.status[selected]].label}” to all ${comp.label.toLowerCase()} in ${state.names[m.s]}`;
}

function selectMember(i){selected=i;const m=meshes[i];const b=new THREE.Box3().setFromObject(m);const c=b.getCenter(new THREE.Vector3());camT.copy(c);sph.r=Math.max(b.getSize(new THREE.Vector3()).length()*2.4,radius*.18);applySph();renderColors();renderDash();}
function setStatus(i,st){state.status[i]=st;renderColors();renderDash();save();}
function bulkSet(sec,c,st){secComp(sec,c).forEach(i=>state.status[i]=st);renderColors();renderDash();save();}

/* events */
function save(){Store.set(KEY,state);}
$('#sel-status').addEventListener('click',e=>{const b=e.target.closest('.sbtn');if(b&&selected!==-1)setStatus(selected,+b.dataset.set);});
$('#sel-applyall').addEventListener('click',()=>{if(selected!==-1){const m=META[selected];bulkSet(m.s,m.c,state.status[selected]);toast('Applied to all '+COMPS[m.c].label.toLowerCase()+' in '+state.names[m.s]);}});
$('#seclist').addEventListener('click',e=>{
  const pip=e.target.closest('.pip');
  if(pip){bulkSet(+pip.dataset.s,+pip.dataset.c,+pip.dataset.set);e.stopPropagation();return;}
  const sec=e.target.closest('.sec');if(!sec)return;if(e.target.classList.contains('nm'))return;
});
$('#seclist').addEventListener('input',e=>{if(e.target.classList.contains('nm')){state.names[+e.target.closest('.sec').dataset.s]=e.target.value;save();refreshSel();}});
$('#title').addEventListener('input',e=>{state.title=e.target.value;save();});
$('#date').addEventListener('input',e=>{state.date=e.target.value;save();});
$('#m-status').onclick=()=>{colorMode='status';$('#m-status').classList.add('on');$('#m-type').classList.remove('on');renderColors();renderDash();};
$('#m-type').onclick=()=>{colorMode='type';$('#m-type').classList.add('on');$('#m-status').classList.remove('on');renderColors();renderDash();};
$('#b-ghost').onclick=()=>{ghost=!ghost;$('#b-ghost').textContent=ghost?'Hide remaining':'Show remaining';$('#b-ghost').style.color=ghost?'':'var(--accent)';renderColors();};
$('#b-plates').onclick=()=>{if(platesMesh){platesMesh.visible=!platesMesh.visible;$('#b-plates').classList.toggle('on',platesMesh.visible);}};
$('#b-frame').onclick=()=>{frameAll(false);renderColors();renderDash();};
$('#b-spin').onclick=()=>{spin=!spin;$('#b-spin').classList.toggle('on',spin);};
function setTool(x){tool=x;['orbit','pan','select'].forEach(k=>$('#t-'+k).classList.toggle('on',k===x));renderer.domElement.style.cursor=x==='pan'?'grab':(x==='select'?'crosshair':'default');}
$('#t-orbit').onclick=()=>setTool('orbit');$('#t-pan').onclick=()=>setTool('pan');$('#t-select').onclick=()=>setTool('select');
function toggleFull(){const e=document.documentElement;if(!document.fullscreenElement&&!document.webkitFullscreenElement){(e.requestFullscreen||e.webkitRequestFullscreen||(()=>{})).call(e);}else{(document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document);}}
$('#b-full').onclick=toggleFull;
document.addEventListener('fullscreenchange',()=>{const on=!!document.fullscreenElement;$('#b-full').classList.toggle('on',on);$('#b-full').textContent=on?'⛶ Exit full':'⛶ Fullscreen';setTimeout(resize,60);});
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resize,60));
function togglePanel(){document.body.classList.toggle('panelhidden');setTimeout(resize,60);}
$('#b-collapse').onclick=togglePanel;$('#b-reveal').onclick=togglePanel;
$('#up').onclick=()=>stepElev(12);$('#down').onclick=()=>stepElev(-12);
$('#elev').addEventListener('input',e=>setElevPct(+e.target.value));
$('#zin').onclick=()=>zoomBy(.8);$('#zout').onclick=()=>zoomBy(1.25);
addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='ArrowUp')stepElev(8);if(e.key==='ArrowDown')stepElev(-8);if(e.key==='+'||e.key==='=')zoomBy(.85);if(e.key==='-')zoomBy(1.18);if(e.key==='h'||e.key==='H')togglePanel();});
$('#b-reset').onclick=()=>{if(confirm('Reset every member to not installed?')){state.status=new Array(META.length).fill(0);selected=-1;renderColors();renderDash();save();}};
$('#b-copy').onclick=()=>{
  const d=state.date.split('-').reverse().join('/');
  let t=`${state.title} — ${d}\nOverall: ${pct()}% complete\n\n`;
  for(let s=0;s<NSEC;s++){
    let parts=[];
    COMPS.forEach((c,ci)=>{const ix=secComp(s,ci);if(!ix.length)return;
      const counts=[0,0,0,0,0];ix.forEach(i=>counts[state.status[i]]++);
      if(counts.slice(1).every(x=>x===0))return; // nothing progressed
      // describe by highest-progressed grouping
      let segs=[];for(let si=4;si>=1;si--){if(counts[si])segs.push(`${STAGES[si].email} ${counts[si]}/${ix.length}`);}
      parts.push(`${c.label.toLowerCase()} ${segs.join(', ')}`);
    });
    t+=`• ${state.names[s]}: ${parts.length?parts.join('; '):'not started'}\n`;
  }
  navigator.clipboard.writeText(t).then(()=>toast('Summary copied — paste into your email')).catch(()=>alert(t));
};
$('#b-export').onclick=()=>{const b=new Blob([JSON.stringify(state)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`sdm_progress_${state.date}.json`;a.click();toast('Progress exported');};
$('#b-import').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=()=>{const rd=new FileReader();rd.onload=()=>{try{const o=JSON.parse(rd.result);if(o.status&&o.status.length===META.length){state=o;selected=-1;renderColors();renderDash();save();toast('Progress imported');}else toast('File does not match this model');}catch(e){toast('Could not read file');}};rd.readAsText(i.files[0]);};i.click();};
let tt;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);}

function defaultState(){
  const names=[];for(let s=0;s<NSEC;s++)names.push(`Module ${s+1}${s===0?' (base)':(s===NSEC-1?' (top)':'')}`);
  const status=new Array(META.length).fill(0);
  // seed: base column legs installed
  for(let i=0;i<META.length;i++) if(META[i].s===0&&META[i].c===0) status[i]=1;
  return {title:'Structural Erection Progress',date:new Date().toISOString().slice(0,10),names,status};
}

(async()=>{
  try{
    $('#load-t').textContent='Decompressing model…';
    const data=await decode(); initGL(data);
    const saved=await Store.get(KEY);
    state=(saved&&saved.status&&saved.status.length===META.length)?saved:defaultState();
    if(!state.names)state.names=defaultState().names;
    renderColors();renderDash();
    $('#load').classList.add('hide');
  }catch(err){$('#load').innerHTML='<div class="t" style="max-width:300px;text-align:center">'+(err.message||err)+'</div>';}
})();
</script>
</body>
</html>
